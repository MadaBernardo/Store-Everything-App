<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Note - StoreEverything</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body style="background-color: #f8f9fa;">

<div class="edit-container">
    <div class="edit-card">
        <div class="form-header">
            <h2><i class="fas fa-edit"></i> Edit Your Note</h2>
            <p style="color: #666; font-size: 0.9rem;">Modify the details of your saved information.</p>
        </div>

        <form th:action="@{/information/edit/{id}(id=${information.id})}" th:object="${information}" method="post">
            <div class="form-group">
                <label>Title</label>
                <input type="text" th:field="*{title}" class="form-control" required minlength="3" maxlength="20">
            </div>

            <div class="form-group">
                <label>Content</label>
                <textarea th:field="*{content}" class="form-control" rows="5" required minlength="5" maxlength="500"></textarea>
            </div>

            <div class="form-group">
                <label>Resource Link (URL)</label>
                <input type="url" th:field="*{link}" class="form-control" placeholder="https://...">
            </div>

            <div class="form-group">
                <label>Category</label>
                <select th:field="*{category}" class="form-control">
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-update">Update Information</button>
                <a th:href="@{/dashboard}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
