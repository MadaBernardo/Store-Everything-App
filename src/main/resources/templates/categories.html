<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StoreEverything - Categories</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div class="navbar">
    <h1>StoreEverything Dashboard</h1>
    <div class="nav-container">
        <div class="nav-links">
            <a th:href="@{/dashboard}">Home</a>
            <a th:href="@{/categories}" style="font-weight: bold; text-decoration: underline;">Categories</a>

            <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
               th:href="@{/admin/users}"
               class="admin-link">
                Manage Users
            </a>
        </div>
        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="logout-btn">Sign Out</button>
        </form>
    </div>
</div>

<div class="container">

    <div class="panel form-panel categories-split-form">
        <h2>New Category</h2>
        <form th:action="@{/categories/add}" th:object="${newCategory}" method="post">
            <div class="form-group">
                <label for="name">Category Name</label>
                <input type="text" id="name" th:field="*{name}" required autofocus
                       minlength="3" maxlength="20" pattern="^[a-z]*$"
                       title="Only lowercase letters allowed without spaces or numbers." />
                <span class="form-hint">3-20 characters, lowercase only.</span>
            </div>
            <button type="submit" class="btn-submit">Save Category</button>
        </form>
    </div>

    <div class="panel list-panel">
        <h2>Existing Categories</h2>

        <table th:if="${not #lists.isEmpty(categories)}">
            <thead>
            <tr>
                <th style="width: 80px;">ID</th>
                <th>Category Name</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cat : ${categories}">
                <td th:text="${cat.id}">1</td>
                <td th:text="${cat.name}">sample_category</td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(categories)}" class="empty-message">
            No categories created yet. Use the form on the left to add your first one!
        </div>
    </div>

</div>

</body>
</html>
